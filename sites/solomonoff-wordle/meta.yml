title: Solomonoff Wordle
blurb: Three games against a universal Bayesian predictor on bit streams generated by short programs. Guess the next bit, name the hidden program, or forecast its probability. The Bayesian uses the universal prior 2^(-L); you can swap in out-of-catalog generators (Thue-Morse, Fibonacci word, pi binary) where neither of you has the advantage.
tags:
  - solomonoff
  - bayesian
  - prediction
  - information-theory
  - game
donate: true
