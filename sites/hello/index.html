<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hello, world</title>
  <meta name="description" content="A friendly hello-world page by gooboolygoo." />
  <style>
    :root{color-scheme:light dark}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      display:grid;place-items:center;
      font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 10%, color-mix(in srgb, #ffdd00 20%, Canvas), Canvas 60%),
        radial-gradient(900px 500px at 80% 90%, color-mix(in srgb, #ea4aaa 12%, Canvas), Canvas 60%),
        Canvas;
      color:CanvasText;
      padding:2rem;
    }
    main{max-width:560px;text-align:center}
    h1{font-size:clamp(2.5rem,8vw,4.5rem);margin:0 0 .75rem;letter-spacing:-.02em;line-height:1.05}
    p{margin:.5rem 0;opacity:.85;font-size:1.1rem}
    a.back{
      display:inline-block;margin-top:1.5rem;
      color:inherit;opacity:.7;text-decoration:underline;
      text-underline-offset:3px;
    }
    a.back:hover{opacity:1}
  </style>
</head>
<body>
  <main>
    <h1>Hello, world.</h1>
    <p>A small, friendly page by <strong>gooboolygoo</strong>.</p>
    <a class="back" href="../">&larr; more projects</a>
  </main>
</body>
</html>
