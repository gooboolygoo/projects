title: The Squeeze — Ethiopia 2024–2026
blurb: An interactive economic autopsy of Ethiopia 2024–2026 — a currency that halved, fuel that doubled, doctors paid less than receptionists. Pick a profession, a city, and a household size to see what a wage actually buys at May 2026 prices.
